<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Rangrezz Street</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0A0A0A;
            color: #F5F5F5;
            font-family: 'Inter', sans-serif;
        }

        header {
            background: #1A1A1A;
            padding: 20px 40px;
            border-bottom: 2px solid #FF007F;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            color: #FF007F;
            font-size: 32px;
            letter-spacing: 2px;
        }

        header span {
            font-family: 'Oswald', sans-serif;
            color: #00F5FF;
            font-size: 14px;
        }

        .stats {
            background: #111;
            padding: 20px 40px;
            font-family: 'Oswald', sans-serif;
            color: #FFAC1C;
            font-size: 16px;
            border-bottom: 1px solid #222;
        }

        .container {
            padding: 40px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-family: 'Oswald', sans-serif;
            color: #00F5FF;
            font-size: 20px;
        }

        .no-messages {
            text-align: center;
            padding: 60px;
            font-family: 'Oswald', sans-serif;
            color: #555;
            font-size: 20px;
        }

        .message-card {
            background: #1A1A1A;
            border-left: 4px solid #00F5FF;
            border-radius: 8px;
            padding: 25px 30px;
            margin-bottom: 25px;
            transition: 0.3s ease;
            position: relative;
        }

        .message-card:hover {
            border-left-color: #FF007F;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.15);
        }

        .message-card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .message-card .name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: #FF007F;
        }

        .message-card .email {
            font-family: 'Oswald', sans-serif;
            color: #00F5FF;
            font-size: 14px;
        }

        .message-card .date {
            font-size: 12px;
            color: #888;
            margin-left: auto;
        }

        .subject-badge {
            display: inline-block;
            background: #FFAC1C;
            color: #000;
            padding: 3px 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 12px;
            border-radius: 3px;
        }

        .message-card .body {
            font-size: 15px;
            line-height: 1.7;
            color: #ccc;
            margin: 15px 0;
            background: #111;
            padding: 15px;
            border-radius: 5px;
        }

        .artwork-preview {
            margin-top: 15px;
        }

        .artwork-preview p {
            font-family: 'Oswald', sans-serif;
            color: #FFAC1C;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .artwork-preview img {
            max-width: 200px;
            max-height: 200px;
            object-fit: cover;
            border-radius: 5px;
            border: 2px solid #333;
        }

        .delete-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: none;
            border: 1px solid #FF007F;
            color: #FF007F;
            font-family: 'Oswald', sans-serif;
            cursor: pointer;
            border-radius: 3px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #FF007F;
            color: #fff;
        }

        .refresh-btn {
            padding: 10px 25px;
            background: #00F5FF;
            color: #000;
            border: none;
            font-family: 'Oswald', sans-serif;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
            transition: 0.3s;
        }

        .refresh-btn:hover {
            background: #00cfcf;
        }
    </style>
</head>
<body>

<header>
    <h1>RANGREZZ STREET — ADMIN PANEL</h1>
    <span>Contact Form Submissions</span>
</header>

<div class="stats" id="stats">
    Loading submissions...
</div>

<div class="container">
    <button class="refresh-btn" onclick="loadMessages()">↻ REFRESH</button>
    <div id="messages-container" class="loading">Loading...</div>
</div>

<script>
    const API = 'http://localhost:5000/api/contact';

    async function loadMessages() {
        const container = document.getElementById('messages-container');
        const stats = document.getElementById('stats');

        container.innerHTML = '<div class="loading">Loading submissions...</div>';

        try {
            const res = await fetch(API);
            const messages = await res.json();

            if (!messages.length) {
                stats.textContent = 'Total Submissions: 0';
                container.innerHTML = '<div class="no-messages">No submissions yet.</div>';
                return;
            }

            stats.textContent = `Total Submissions: ${messages.length}`;

            container.innerHTML = messages.map(msg => `
                <div class="message-card" id="card-${msg._id}">
                    <div class="meta">
                        <span class="name">${msg.name}</span>
                        <span class="email">${msg.email}</span>
                        <span class="subject-badge">${msg.subject}</span>
                        <span class="date">${new Date(msg.createdAt).toLocaleString('en-IN')}</span>
                    </div>
                    <div class="body">${msg.message}</div>
                    ${msg.artwork ? `
                        <div class="artwork-preview">
                            <p>📎 Attached Artwork:</p>
                            <img src="http://localhost:5000/uploads/${msg.artwork}" alt="Artwork">
                        </div>` : ''}
                    <button class="delete-btn" onclick="deleteMessage('${msg._id}')">🗑 DELETE</button>
                </div>
            `).join('');

        } catch (err) {
            container.innerHTML = '<div class="no-messages">❌ Could not connect to backend. Make sure server is running.</div>';
            stats.textContent = 'Error loading data';
        }
    }

    async function deleteMessage(id) {
        if (!confirm('Are you sure you want to delete this message?')) return;

        try {
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            const data = await res.json();

            if (data.success) {
                document.getElementById(`card-${id}`).remove();
                // Update count
                const remaining = document.querySelectorAll('.message-card').length;
                document.getElementById('stats').textContent = `Total Submissions: ${remaining}`;
            }
        } catch (err) {
            alert('Error deleting message. Please try again.');
        }
    }

    // Load messages when page opens
    loadMessages();
</script>

</body>
</html>
